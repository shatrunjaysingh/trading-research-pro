  <rect x="176" y="240" width="70" height="212" rx="8" fill="#3b82f6" opacity="0.85"/>
  <rect x="272" y="180" width="70" height="272" rx="8" fill="#3b82f6"/>
  <rect x="368" y="120" width="70" height="332" rx="8" fill="#60a5fa"/>
